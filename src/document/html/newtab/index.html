<div hidden>
  <sync-view from="html.attributes.theme.value" to="window.localStorage.theme" events='["change"]'></sync-view>
</div>
<div Spinner>
  <img src="/media/tail.png" width="25" height="25">
  <div Blue class="c-blue">
    <div uk-spinner="ratio: 5"></div>
  </div>
  <div Orange class="c-orange">
    <div uk-spinner="ratio: 4"></div>
  </div>
  <div Blue class="c-blue">
    <div uk-spinner="ratio: 3"></div>
  </div>
  <div Orange class="c-orange">
    <div uk-spinner="ratio: 2"></div>
  </div>
</div>
<div id="Panel" panel="None">
  <show-when class="bg-base" target="#Panel.attributes.panel.value" regex="ConsolePanel" events='["sync"]' in="fade.300" out="fade.300">
    <gate src="/html/newtab/console.html" class="block"></gate>
  </show-when>
</div>
<a class="uk-icon-button help-open" uk-icon="question" uk-toggle href="#modal-overflow" uk-tooltip="Help"></a>
<gate src="/html/newtab/modal.html" class="block"></gate>
</body>
