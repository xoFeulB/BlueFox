<!DOCTYPE html>
<html class="bg-muted" theme="Light">
<script src="/modules/BlueFox/theme.js"></script>
<script src="/modules/BlueFox/customElements.js"></script>

<head>
  <title>^.,.^ BlueFox</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="/modules/BlueFox/sync/values.js" type="module"></script>
  <script src="/modules/BlueFox/sync/view.js" type="module"></script>

  <script src="/modules/BlueFox/bluefox.lib.js"></script>
  <script src="/modules/BlueFox/md-src.js" type="module"></script>

  <!-- UIkit -->
  <link rel="stylesheet" href="/modules/uikit/css/uikit.min.css" />
  <script src="/modules/uikit/js/uikit.min.js" defer></script>
  <script src="/modules/uikit/js/uikit-icons.min.js" defer></script>

  <link href="/modules/fontawesome/css/fontawesome.css" rel="stylesheet" />
  <link href="/modules/fontawesome/css/solid.min.css" rel="stylesheet" />
  <link href="/modules/fontawesome/css/regular.min.css" rel="stylesheet" />
  <link href="/modules/fontawesome/css/brands.min.css" rel="stylesheet" />

  <!-- MonacoEditor -->
  <script src="/modules/monaco-editor/min/vs/loader.js" defer></script>

  <link rel="stylesheet" href="/document/common/css/common.css" />
  <link rel="stylesheet" href="/document/common/css/modern-ui.css" />
  <link rel="stylesheet" href="/document/focus/css/index.css" />

  <link rel="stylesheet" href="/modules/highlight/styles/github.min.css" />

  <script src="/document/focus/js/init.js" type="module"></script>
  <script src="/document/focus/js/index.js" type="module"></script>
</head>

<body>
  <div hidden>
    <sync-view from="html.attributes.theme.value" to="window.localStorage.theme" events='["change"]'></sync-view>
    <sync-view id="TabInfo" from="this.TabInfo.title" to="window.document.title" events='["sync"]'></sync-view>
  </div>
  <div Spinner>
    <img src="/media/tail.png" width="25" height="25">
    <div Blue class="c-blue">
      <div uk-spinner="ratio: 5"></div>
    </div>
    <div Orange class="c-orange">
      <div uk-spinner="ratio: 4"></div>
    </div>
    <div Blue class="c-blue">
      <div uk-spinner="ratio: 3"></div>
    </div>
    <div Orange class="c-orange">
      <div uk-spinner="ratio: 2"></div>
    </div>
  </div>
  <div id="Panel" panel="None">
    <show-when class="bg-base" target="#Panel.attributes.panel.value" regex="ConsolePanel" events='["sync"]' in="fade.300" out="fade.300">
      <ga-te src="/document/focus/html/console.html" class="block"></ga-te>
    </show-when>
  </div>
  <a class="uk-icon-button help-open" uk-icon="question" uk-toggle href="#modal-overflow" uk-tooltip="Help"></a>
  <ga-te src="/document/focus/html/modal.html" class="block"></ga-te>
</body>

</html>
