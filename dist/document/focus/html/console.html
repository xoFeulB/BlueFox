<div Console="Scripting" class="bg-base">
  <nav TopNav class="uk-flex uk-flex-between uk-flex-middle uk-padding-small uk-background-dafault radius-bottom uk-box-shadow-small bg-base" uk-sticky>
    <div class="uk-flex uk-flex-middle">
      <img favIcon src="" class="uk-margin-small-right" width="20" height="20" class="img-selectable" />
      <code>
        <sync-view class="logo-color-auto" from="#TabInfo.TabInfo.url" to="this.textContent"></sync-view>
      </code>
    </div>
    <div class="uk-flex uk-flex-middle">
      <div class="uk-margin-small-right">
        <input QuerySelector type="text" class="uk-input uk-form-width-medium" placeholder="QuerySelector" value="html" uk-tooltip="CaptureScreenshot Selector">
        <button CaptureScreenshot class="uk-icon-button button-radius-right" uk-icon="camera" uk-tooltip="CaptureScreenshot to Clipboard"></button>
      </div>
      <div class="uk-margin-small-right">
        <show-when target="html.attributes.theme.value" regex="Light" in="loll.300" out="roll.300">
          <set-value-on-click value="Dark" target="html.attributes.theme.value">
            <button class="uk-icon-button" uk-icon uk-tooltip="Switch Dark Theme">
              <i class="fa-regular fa-moon c-blue"></i>
            </button>
          </set-value-on-click>
        </show-when>
        <show-when target="html.attributes.theme.value" regex="Dark" in="roll.300" out="loll.300">
          <set-value-on-click value="Light" target="html.attributes.theme.value">
            <button class="uk-icon-button" uk-icon uk-tooltip="Switch Light Theme">
              <i class="fa-regular fa-sun c-orange"></i>
            </button>
          </set-value-on-click>
        </show-when>
      </div>
      <set-value-on-click value="Scripting" target="[Console].attributes.Console.value">
        <button class="uk-icon-button uk-margin-small-right" uk-icon="code" uk-tooltip="Scripting" Scripting></button>
      </set-value-on-click>
      <set-value-on-click value="Tabs" target="[Console].attributes.Console.value">
        <button class="uk-icon-button" uk-icon="world" uk-tooltip="Tabs" Tabs></button>
      </set-value-on-click>
    </div>
  </nav>

  <show-when class="bg-base" target="[Console].attributes.Console.value" regex="Scripting" events='["change"]' in="top.100" out="top.100">
    <div class="uk-section uk-section-small">
      <div class="uk-container uk-container-default">
        <h2>Scripting</h2>
      </div>
    </div>
  </show-when>
  <show-when class="bg-base" target="[Console].attributes.Console.value" regex="Tabs" events='["change"]' in="top.100" out="top.100">
    <ga-te src="/document/focus/html/tabs.html" class="block"></ga-te>
  </show-when>
  <show-when class="bg-base" target="[Console].attributes.Console.value" regex="CaptureScreenshot" events='["change"]' in="top.100" out="top.100">
    <div class="uk-section uk-section-small">
      <div class="uk-container uk-container-default">
        <h2>CaptureScreenshot</h2>
      </div>
    </div>
  </show-when>

  <ga-te src="/document/common/html/footer.html" class="block"></ga-te>
</div>
