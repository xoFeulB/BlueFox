<div Console>
  <div class="uk-flex bg-base">
    <div class="uk-width-expand">
      <nav TopNav class="uk-flex uk-flex-between uk-flex-middle uk-padding-small uk-background-dafault radius-bottom uk-box-shadow-small bg-base" uk-sticky>
        <div class="uk-flex uk-flex-middle"></div>
        <div class="uk-flex uk-flex-middle">
          <div class="uk-margin-small-right">
            <show-when target="html.attributes.theme.value" regex="Light" in="loll.300" out="roll.300">
              <set-value-on-click value="Dark" target="html.attributes.theme.value">
                <button class="uk-icon-button" uk-icon uk-tooltip="Switch Dark Theme">
                  <i class="fa-regular fa-moon c-blue"></i>
                </button>
              </set-value-on-click>
            </show-when>
            <show-when target="html.attributes.theme.value" regex="Dark" in="roll.300" out="loll.300">
              <set-value-on-click value="Light" target="html.attributes.theme.value">
                <button class="uk-icon-button" uk-icon uk-tooltip="Switch Light Theme">
                  <i class="fa-regular fa-sun c-orange"></i>
                </button>
              </set-value-on-click>
            </show-when>
          </div>
          <button class="uk-icon-button uk-margin-small-right" uk-icon="camera" uk-tooltip="Capture Screenshots" CaptureScreenshots></button>
        </div>
      </nav>
    </div>
  </div>

  <div id="modal-media-image" class="uk-flex-top" uk-modal>
    <div class="uk-modal-dialog uk-width-auto uk-margin-auto-vertical">
      <button class="uk-modal-close-outside" type="button" uk-close></button>
      <div image></div>
    </div>
  </div>

</div>
<a class="uk-button uk-button-default" href="#modal-media-image" uk-toggle>Image</a>
<div FilesNote class="uk-position-bottom-left bg-base radius-top-right" uk-tooltip="Right click image to copy ...">
  <show-when Files="hidden" class="uk-child-width-1-2@s uk-child-width-1-3@m uk-padding-small" uk-grid="masonry: pack" target="this.attributes.Files.value" regex="show" events='["sync"]' in="fade.300" out="fade.300"></show-when>
</div>
</div>
